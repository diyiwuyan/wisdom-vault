<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>概念索引 · 大神认知知识库</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .page-hero {
      padding: 60px 40px 40px;
      border-bottom: 1px solid var(--border);
    }

    .page-hero h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .page-hero p { font-size: 15px; color: var(--text-secondary); }

    .concepts-container { max-width: 1100px; margin: 0 auto; padding: 40px 40px 80px; }

    /* ── 筛选栏 ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }

    .filter-chip:hover { border-color: var(--border-bright); color: var(--text-primary); }
    .filter-chip.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: var(--text-primary); }

    /* ── 概念卡片网格 ── */
    .concepts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .concept-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.2s;
    }

    .concept-card:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
    }

    .concept-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .concept-name { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .concept-name-en { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .concept-quote-count {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .concept-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .concept-people {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .person-pip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .concept-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag-pill {
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 11px;
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .concept-card-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .related-count { font-size: 11px; }

    @media (max-width: 768px) {
      .page-hero { padding: 40px 20px 28px; }
      .page-hero h1 { font-size: 26px; }
      .concepts-container { padding: 24px 20px 60px; }
      .concepts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-logo"><span class="dot"></span>Wisdom Vault</a>
  <ul class="nav-links">
    <li><a href="../index.html">首页</a></li>
    <li><a href="../people/munger.html">芒格</a></li>
    <li><a href="../people/naval.html">纳瓦尔</a></li>
    <li><a href="../people/buffett.html">巴菲特</a></li>
    <li><a href="../quotes/index.html">语录库</a></li>
    <li><a href="../articles/index.html">书单</a></li>
    <li><a href="index.html" class="active">概念</a></li>
    <li><a href="../graph.html">图谱</a></li>
  </ul>
</nav>

<div class="page-hero fade-in">
  <h1>💡 核心概念索引</h1>
  <p>跨越三位大神的 <span id="total-count">15</span> 个核心概念，每个概念都能溯源到原话，链接到相关思想。</p>
</div>

<div class="concepts-container">

  <div class="filter-bar">
    <button class="filter-chip active" onclick="filterBy('all', this)">全部</button>
    <button class="filter-chip" onclick="filterBy('shared', this)">🤝 三人共鸣</button>
    <button class="filter-chip" onclick="filterBy('munger', this)" style="border-color:rgba(240,165,0,0.3)">🦁 芒格专属</button>
    <button class="filter-chip" onclick="filterBy('naval', this)" style="border-color:rgba(0,201,167,0.3)">⚡ 纳瓦尔专属</button>
    <button class="filter-chip" onclick="filterBy('buffett', this)" style="border-color:rgba(224,92,92,0.3)">🏛️ 巴菲特专属</button>
    <button class="filter-chip" onclick="filterBy('tag-投资', this)">💰 投资</button>
    <button class="filter-chip" onclick="filterBy('tag-思维', this)">🧠 思维</button>
    <button class="filter-chip" onclick="filterBy('tag-财富', this)">✨ 财富</button>
  </div>

  <div class="concepts-grid" id="concepts-grid"></div>
</div>

<script src="../data/concepts.js"></script>
<script src="../data/quotes.js"></script>
<script>
const PERSON_CONFIG = {
  munger:  { name: '芒格', emoji: '🦁', color: 'var(--munger)', bg: 'rgba(240,165,0,0.08)' },
  naval:   { name: '纳瓦尔', emoji: '⚡', color: 'var(--naval)', bg: 'rgba(0,201,167,0.08)' },
  buffett: { name: '巴菲特', emoji: '🏛️', color: 'var(--buffett)', bg: 'rgba(224,92,92,0.08)' }
};

let currentFilter = 'all';

function getQuoteCount(conceptId) {
  return WV_QUOTES.filter(q => (q.concepts||[]).includes(conceptId)).length;
}

function getRelatedCount(conceptId) {
  return WV_CONCEPT_LINKS.filter(l => l.source === conceptId || l.target === conceptId).length;
}

function renderCard(c) {
  const peoplePips = c.people.map(p => {
    const cfg = PERSON_CONFIG[p];
    return `<span class="person-pip" style="background:${cfg.bg};color:${cfg.color}">${cfg.emoji} ${cfg.name}</span>`;
  }).join('');

  const tagPills = c.tags.map(t => `<span class="tag-pill">${t}</span>`).join('');
  const qCount = getQuoteCount(c.id);
  const rCount = getRelatedCount(c.id);

  return `
    <a class="concept-card" href="${c.id}.html">
      <div class="concept-card-header">
        <div>
          <div class="concept-name">${c.name}</div>
          <div class="concept-name-en">${c.nameEn}</div>
        </div>
        <div class="concept-quote-count">${qCount} 条语录</div>
      </div>
      <div class="concept-desc">${c.desc}</div>
      <div class="concept-people">${peoplePips}</div>
      <div class="concept-tags">${tagPills}</div>
      <div class="concept-card-footer">
        <span class="related-count">🔗 ${rCount} 个关联概念</span>
        <span style="color:var(--text-muted)">查看详情 →</span>
      </div>
    </a>
  `;
}

function filterBy(value, btn) {
  currentFilter = value;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  let filtered = WV_CONCEPTS;

  if (currentFilter === 'shared') {
    filtered = filtered.filter(c => c.people.length >= 2);
  } else if (['munger','naval','buffett'].includes(currentFilter)) {
    filtered = filtered.filter(c => c.people.includes(currentFilter) && c.people.length === 1);
  } else if (currentFilter.startsWith('tag-')) {
    const tag = currentFilter.replace('tag-', '');
    filtered = filtered.filter(c => (c.tags||[]).includes(tag));
  }

  document.getElementById('concepts-grid').innerHTML = filtered.map(renderCard).join('');
}

document.getElementById('total-count').textContent = WV_CONCEPTS.length;
render();
</script>
</body>
</html>
