    .concept-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;

    .breadcrumb span { margin: 0 6px; }

    .concept-hero { margin-bottom: 40px; }

    .concept-hero h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 600px;
    }

    .concept-people-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .person-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .person-badge:hover { opacity: 0.8; }

    /* 鈹€鈹€ 鍘熻瘽绮鹃€?鈹€鈹€ */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .count-badge {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .quotes-list { margin-bottom: 48px; }

    .quote-item {
      border-left: 2px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.015);
      border-radius: 0 8px 8px 0;
      transition: border-color 0.2s;
    }

    .quote-item:hover { border-left-color: var(--border-bright); }

    .quote-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .quote-person-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
    }

    .quote-source-tag {
      font-size: 11px;
      color: var(--text-muted);
    }

    .quote-year-tag {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .quote-text-main {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
      font-style: italic;
      margin-bottom: 6px;
    }

    .quote-text-en-main {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.6;
    }

    /* 鈹€鈹€ 渚ц竟鏍?鈹€鈹€ */
    .concept-sidebar {
      border-left: 1px solid var(--border);
      padding-left: 32px;
    }

    .sidebar-widget { margin-bottom: 36px; }

    .widget-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .related-concept-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 6px;
      transition: all 0.15s;
    }

    .related-concept-link:hover {
      border-color: var(--border-bright);
      color: var(--text-primary);
    }

    .related-concept-link .arrow { color: var(--text-muted); font-size: 11px; }

    .person-link-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      margin-bottom: 8px;
      transition: all 0.15s;
    }

    .person-link-card:hover { border-color: var(--border-bright); }

    .person-link-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .person-link-name { font-size: 13px; font-weight: 600; }
    .person-link-sub { font-size: 11px; color: var(--text-muted); }

    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag-cloud-item {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    @media (max-width: 900px) {
      .concept-layout { grid-template-columns: 1fr; padding: 24px 20px 60px; }

      .concept-sidebar { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 32px; }
    }
  </style>

<script>
// 从URL获取概念ID（文件名）
const conceptId = location.pathname.split('/').pop().replace('.html','');

const PERSON_CONFIG = Object.fromEntries(
  WV_PEOPLE.map(p => [p.id, {
    name: p.name,
    nameShort: p.nameShort,
    emoji: p.emoji,
    color: p.color,
    bg: 'rgba(128,128,128,0.1)',
    path: '../' + p.url
  }])
);

function init() {
  const concept = WV_CONCEPTS.find(c => c.id === conceptId);
  if (!concept) {
    document.querySelector('.concept-main').innerHTML = '<p style="color:var(--text-muted);padding:40px 0">概念未找到</p>';
    return;
  }

  // 页面标题
  document.title = concept.name + ' · 大神认知知识库';
  document.getElementById('page-title').textContent = concept.name + ' · 大神认知知识库';
  document.getElementById('bc-name').textContent = concept.name;

  // 英雄区
  document.getElementById('hero-name').textContent = concept.name;
  document.getElementById('hero-en').textContent = concept.nameEn;
  document.getElementById('hero-desc').textContent = concept.desc;

  // 人物标签
  const peoplePips = concept.people.map(p => {
    const cfg = PERSON_CONFIG[p];
    if (!cfg) return '';
    return `<a class="person-badge" href="${cfg.path}" style="background:${cfg.bg};color:${cfg.color}">${cfg.emoji} ${cfg.name}</a>`;
  }).join('');
  document.getElementById('hero-people').innerHTML = peoplePips;

  // 语录
  const quotes = WV_QUOTES.filter(q => (q.concepts||[]).includes(conceptId));
  document.getElementById('quotes-count').textContent = quotes.length + ' 条';
  document.getElementById('quotes-container').innerHTML = quotes.map(q => {
    const p = PERSON_CONFIG[q.person];
    if (!p) return '';
    return `
      <div class="quote-item" style="border-left-color:${p.color}66">
        <div class="quote-item-header">
          <span class="quote-person-tag" style="background:${p.bg};color:${p.color}">${p.emoji} ${p.name}</span>
          <span class="quote-source-tag">${q.source}</span>
          <span class="quote-year-tag">${q.year}</span>
        </div>
        <div class="quote-text-main">"${q.text}"</div>
        ${q.textEn ? `<div class="quote-text-en-main">"${q.textEn}"</div>` : ''}
      </div>
    `;
  }).join('') || '<p style="color:var(--text-muted);font-size:14px">暂无语录</p>';

  // 关联概念
  const links = WV_CONCEPT_LINKS.filter(l => l.source === conceptId || l.target === conceptId);
  const relatedIds = links.map(l => l.source === conceptId ? l.target : l.source);
  const relatedConcepts = relatedIds.map(id => WV_CONCEPTS.find(c => c.id === id)).filter(Boolean);

  document.getElementById('related-concepts').innerHTML = relatedConcepts.map(c => `
    <a class="related-concept-link" href="${c.id}.html">
      <span>${c.name}</span>
      <span class="arrow">→</span>
    </a>
  `).join('') || '<p style="color:var(--text-muted);font-size:13px">暂无关联</p>';

  // 涉及人物
  document.getElementById('related-people').innerHTML = concept.people.map(p => {
    const cfg = PERSON_CONFIG[p];
    if (!cfg) return '';
    const qCount = WV_QUOTES.filter(q => q.person === p && (q.concepts||[]).includes(conceptId)).length;
    return `
      <a class="person-link-card" href="${cfg.path}">
        <div class="person-link-avatar" style="background:${cfg.bg};border:1px solid ${cfg.color}44">${cfg.emoji}</div>
        <div>
          <div class="person-link-name" style="color:${cfg.color}">${cfg.name}</div>
          <div class="person-link-sub">${qCount} 条相关语录</div>
        </div>
      </a>
    `;
  }).join('');

  // 标签
  document.getElementById('tag-cloud').innerHTML = (concept.tags||[]).map(t =>
    `<span class="tag-cloud-item">${t}</span>`
  ).join('');
}

init();
</script>
